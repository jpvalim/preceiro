<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>PRECEIRO</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      margin: 0;
    }

    /* 🔥 HEADER */
    .header {
      height: 180px;
      background: url('https://n8n.jpv-cloud.com.br/webhook-test/15a21d86-7b8c-4c39-83a2-b65c6109e30e') center/cover no-repeat;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      color: white;
    }

    .header::after {
      content: "";
      position: absolute;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      top: 0;
      left: 0;
    }

    .header h1 {
      position: relative;
      z-index: 1;
      font-size: 28px;
      letter-spacing: 2px;
    }

    .container {
      background: white;
      margin: 20px auto 20px;
      padding: 20px;
      border-radius: 16px;
      width: 90%;
      max-width: 400px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.1);
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
    }

    .input-group {
      display: flex;
      gap: 10px;
    }

    input {
      padding: 10px;
      border-radius: 10px;
      border: 1px solid #ddd;
      font-size: 14px;
    }

    #item {
      flex: 2;
    }

    #qtd {
      flex: 1;
      text-align: center;
    }

    button {
      border: none;
      border-radius: 10px;
      padding: 10px;
      cursor: pointer;
      font-weight: bold;
    }

    .btn-add {
      width: 100%;
      margin-top: 10px;
      background: #4CAF50;
      color: white;
    }

    .btn-add:hover {
      background: #45a049;
    }

    ul {
      list-style: none;
      padding: 0;
      margin-top: 20px;
    }

    li {
      background: #fafafa;
      padding: 10px;
      border-radius: 10px;
      margin-bottom: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .item-text {
      font-size: 14px;
    }

    .btn-remove {
      background: #ff4d4d;
      color: white;
      padding: 5px 8px;
      font-size: 12px;
    }

    .btn-remove:hover {
      background: #e60000;
    }

    .btn-send {
      width: 100%;
      margin-top: 15px;
      background: #2196F3;
      color: white;
    }

    .btn-send:hover {
      background: #1e88e5;
    }

    input {
      width: 90%;
      margin-top: 8px;
  }

   #resultado {
      background: white;
      margin: 20px auto 20px;
      padding: 20px;
      border-radius: 16px;
      width: 90%;
      max-width: 400px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.1);
    }

  </style>
</head>

<body>

<!-- 🔥 HEADER BONITO -->
<div class="header">
  <h1>🛒 PRECEIRO</h1>
</div>

<div class="container">
  <h3>Seus dados</h3>

  <input id="nome" placeholder="Seu nome" />
  <input id="telefone" placeholder="Telefone (WhatsApp)" />
  <input id="email" placeholder="E-mail" />



</div>
  

<div class="container">

  <h2>Sua lista de compras</h2>

  <div class="input-group">
    <input id="item" placeholder="Item..." />
    <input id="qtd" type="number" value="1" min="1" />
  </div>

  <button class="btn-add" onclick="addItem()">+ Adicionar</button>

  <ul id="lista"></ul>

  <button class="btn-send" onclick="enviar()">Finalizar Lista</button>

</div>

<div id="resultado"></div>

<script>
let itens = [];

function addItem() {
  const item = document.getElementById('item').value.trim();
  const qtd = document.getElementById('qtd').value;
  
  if (!item || !qtd) return;

  itens.push({
    item: item,
    quantidade: Number(qtd)
  });

  document.getElementById('item').value = "";
  document.getElementById('qtd').value = 1;

  render();
}

function remover(index) {
  itens.splice(index, 1);
  render();
}

function render() {
  const ul = document.getElementById('lista');
  ul.innerHTML = "";
  
  itens.forEach((item, index) => {
    ul.innerHTML += `
      <li>
        <span class="item-text">
          ${item.item} <strong>(${item.quantidade}x)</strong>
        </span>
        <button class="btn-remove" onclick="remover(${index})">❌</button>
      </li>
    `;
  });
}

async function enviar() {
  const nome = document.getElementById('nome').value;
  const telefone = document.getElementById('telefone').value;
  const email = document.getElementById('email').value;
  
  if (!nome || !telefone || !email) {
    alert("Preencha seus dados!");
    return;
  }

  const response = await fetch("https://n8n.jpv-cloud.com.br/webhook-test/15a21d86-7b8c-4c39-83a2-b65c6109e30e", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      usuario: { nome, telefone, email },
      itens: itens
    })
  });

  const data = await response.json(); // 👈 pega resposta do n8n

  renderResultado(data);
  
}

function renderResultado(lista) {
  const div = document.getElementById("resultado");

  div.innerHTML = `
    <h2 style="margin-top:20px;">🛒 Resultado</h2>

    ${lista.map(item => `
      <div style="
        background: #fff;
        border-radius: 12px;
        padding: 15px;
        margin-bottom: 12px;
        box-shadow: 0 4px 10px rgba(0,0,0,0.08);
        border-left: 6px solid ${item.status === 'encontrado' ? '#4CAF50' : '#f44336'};
      ">

        <div style="display:flex; justify-content:space-between; align-items:center;">
          <strong style="font-size:16px;">${item.item}</strong>
          <span style="
            font-size:12px;
            padding:4px 8px;
            border-radius:8px;
            background:${item.status === 'encontrado' ? '#e8f5e9' : '#fdecea'};
            color:${item.status === 'encontrado' ? '#2e7d32' : '#c62828'};
          ">
            ${item.status === 'encontrado' ? '✔ Encontrado' : '❌ Não encontrado'}
          </span>
        </div>

        <div style="margin-top:10px; font-size:14px; color:#555;">
          <div>💰 <strong>Preço:</strong> R$ ${item.preco ?? '-'}</div>
          <div>🏪 <strong>Mercado:</strong> ${item.mercado ?? '-'}</div>
          <div>📦 <strong>Quantidade:</strong> ${item.quantidade}</div>
        </div>

      </div>
    `).join("")}
  `;
}

</script>

</body>
</html>
